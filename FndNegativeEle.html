<body>
    <script>
        //write a function that returns the number of negative elements in an array
        function negativeEle(arr){
            let count = 0;
            for(let i=0;i<arr.length;i++){
                if(arr[i]<0){
                    count++;
                }
            }
            return count;
        }
        const arr = [4,-2,-17,0,29,-7,88];
        let result = negativeEle(arr);
        console.log(result);
    </script>
</body>
